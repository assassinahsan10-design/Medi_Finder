<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediFinder - Set Reminders</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/9dec450bb1.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="UserReminders.css">
</head>
<body>

    <!-- ===================== SIDEBAR ===================== -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        <div class="sidebar-inner">

            <div class="sidebar__logo">
                <div class="sidebar__logo-icon">
                    <img src="Images/Logo.png" alt="MediFinder Logo">
                </div>
                <div class="sidebar__logo-text">
                    <span class="sidebar__brand">MediFinder</span>
                    <span class="sidebar__portal">User Portal</span>
                </div>
            </div>

            <nav class="sidebar__nav">
                <a href="UserDashboard.html" class="nav-item">
                    <i class="fa-solid fa-table-cells-large nav-item__icon"></i>
                    <span>Dashboard</span>
                </a>
                <a href="UserPharmacySearch.html" class="nav-item">
                    <i class="fa-solid fa-magnifying-glass nav-item__icon"></i>
                    <span>Pharmacy Search</span>
                </a>
                <a href="UserProfile.html" class="nav-item">
                    <i class="fa-regular fa-user nav-item__icon"></i>
                    <span>Profile</span>
                </a>
                <a href="UserHistory.html" class="nav-item">
                    <i class="fa-solid fa-clock-rotate-left nav-item__icon"></i>
                    <span>My History</span>
                </a>
                <a href="UserReminders.html" class="nav-item nav-item--active">
                    <i class="fa-regular fa-bell nav-item__icon"></i>
                    <span>Set Reminders</span>
                </a>
            </nav>

            <!-- Sidebar user — JS populates name, email, avatar -->
            <div class="sidebar__user">
                <div class="user-avatar">
                    <div id="sidebarAvatarWrap" style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;"></div>
                </div>
                <div class="user-meta">
                    <span class="user-name"  id="sidebarUserName">Loading…</span>
                    <span class="user-email" id="sidebarUserEmail"></span>
                </div>
                <button class="user-logout" id="logoutBtn" title="Log out">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i>
                </button>
            </div>

        </div>
    </aside>

    <!-- ===================== MAIN ===================== -->
    <main class="main">

        <header class="topbar">
            <button class="topbar__hamburger" id="hamburgerBtn" aria-label="Toggle sidebar">
                <i class="fa-solid fa-bars"></i>
            </button>
            <div class="topbar__title">
                <h1>My Reminders</h1>
                <nav class="breadcrumb" aria-label="breadcrumb">
                    <a href="UserDashboard.html" class="breadcrumb__link">Dashboard</a>
                    <i class="fa-solid fa-chevron-right"></i>
                    <span class="breadcrumb__active">Reminders</span>
                </nav>
            </div>
            <div class="topbar__actions">
                <div class="search-bar">
                    <i class="fa-solid fa-magnifying-glass search-bar__icon"></i>
                    <input type="search" class="search-bar__input" placeholder="Search Reminder" aria-label="Search medication">
                </div>
                <button class="btn-set-reminder" id="setReminderBtn">
                    <i class="fa-solid fa-bell"></i>
                    <span>Set Reminder</span>
                </button>
            </div>
        </header>

        <section class="reminders-section">
            <div class="reminders-section__header">
                <div class="reminders-section__title-group">
                    <h2 class="reminders-section__title">Today's Reminders</h2>
                    <p class="reminders-section__subtitle">Manage your medication schedule</p>
                </div>
                <div class="tabs" role="tablist">
                    <a href="UserReminders.html"       class="tab tab--active" role="tab">Due</a>
                    <a href="UserRemindersTaken.html"   class="tab"            role="tab">Taken</a>
                    <a href="UserRemindersMissed.html"  class="tab"            role="tab">Missed</a>
                </div>
            </div>
        </section>

        <!-- JS populates this -->
        <div class="reminder-list" id="reminderList">
            <div style="text-align:center;padding:60px 20px;color:var(--gray);">
                <i class="fa-solid fa-spinner fa-spin" style="font-size:32px;opacity:.4;display:block;margin-bottom:14px;"></i>
                <p style="font-size:14px;">Loading reminders…</p>
            </div>
        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <script src="UserReminders.js"></script>
</body>
</html>
